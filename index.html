<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You Died</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>

    <h1>You Died</h1>

    <div class="scene">
        <div class="scene__bg">
            <img id="background" src="images/dining_hall.jpg" alt="Background">
        </div>
        <div class="scene__vignette"></div>
        <div class="scene__crest" id="crest">✦ Chapter 1 ✦</div>

        <div class="speaker">
            <span class="speaker__name" id="speakerName">Placeholder</span>
        </div>

        <div class="scene__sprite hidden">
            <img id="characterSprite" src="">
        </div>

        <div class="dialogue">
            <p class="dialogue__text" id="mainText">
                Placeholder
                <span class="dialogue__cursor"></span>
            </p>
        </div>
    </div>

    <div class="ui">
        <p class="ui__hint" id="hintText"></p>
        <p class="ui__extra" id="extraText"></p>

        <div class="ui__buttons">
            <button id="option1">Option 1</button>
            <button id="option2">Option 2</button>
            <button id="next">Next</button>
        </div>
    </div>

</body>
</html>
